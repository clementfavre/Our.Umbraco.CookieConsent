name: Release

# Manual only: pick a version, inspect the artifact, then publish when happy
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version to build (e.g. 0.0.3)'
        required: true
        type: string
      publish:
        description: 'Push to NuGet (leave off for a dry run)'
        required: true
        type: boolean
        default: false

env:
  PROJECT: src/Our.Umbraco.CookieConsent/Our.Umbraco.CookieConsent.csproj

# id-token lets the job exchange a GitHub OIDC token for a short-lived NuGet key
permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Protection rules decide who may release, and the nuget.org policy is bound to this name
    environment: nuget
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ${{ env.PROJECT }}

      - name: Build
        run: dotnet build ${{ env.PROJECT }} -c Release --no-restore

      - name: Pack
        run: dotnet pack ${{ env.PROJECT }} -c Release --no-build -o artifacts -p:Version=${{ inputs.version }}

      - name: Verify package contents
        run: |
          PKG=$(ls artifacts/*.nupkg)
          echo "Inspecting $PKG"
          unzip -l "$PKG" | tee listing.txt

          REQUIRED="
          lib/net10.0/Our.Umbraco.CookieConsent.dll
          staticwebassets/App_Plugins/Our.Umbraco.CookieConsent/umbraco-package.json
          staticwebassets/App_Plugins/Our.Umbraco.CookieConsent/cookie-consent-dashboard.js
          staticwebassets/libraries/cookieconsent-orestbida/cookieconsent.umd.min.js
          staticwebassets/libraries/cookieconsent-orestbida/cookieconsent.min.css
          "

          MISSING=0
          for entry in $REQUIRED; do
            if grep -qF "$entry" listing.txt; then
              echo "ok      $entry"
            else
              echo "MISSING $entry"
              MISSING=1
            fi
          done

          if [ "$MISSING" -ne 0 ]; then
            echo "::error::The package is missing required files, refusing to publish"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nupkg-${{ inputs.version }}
          path: artifacts/*.nupkg

      # The key is valid for one hour and single use, so it is requested right before pushing
      - name: NuGet login
        if: ${{ inputs.publish }}
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet
        if: ${{ inputs.publish }}
        run: dotnet nuget push artifacts/*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --skip-duplicate
